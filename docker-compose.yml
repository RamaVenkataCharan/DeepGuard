version: "3.8"

services:
  # ---- MySQL 8 ----
  mysql:
    image: mysql:8.0
    container_name: deepguard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepguard-net

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: deepguard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepguard-net

  # ---- Flask Backend ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepguard-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - backend_reports:/app/reports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: flask run --host=0.0.0.0 --port=5000 --reload
    networks:
      - deepguard-net

  # ---- Celery Worker ----
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepguard-celery-worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./ml:/ml
      - backend_reports:/app/reports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker --loglevel=info --concurrency=2
    networks:
      - deepguard-net

  # ---- Celery Beat (Scheduler) ----
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepguard-celery-beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./ml:/ml
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks beat --loglevel=info
    networks:
      - deepguard-net

  # ---- React Frontend ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepguard-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api
    command: npm run dev -- --host 0.0.0.0 --port 3000
    networks:
      - deepguard-net

volumes:
  mysql_data:
  redis_data:
  backend_reports:

networks:
  deepguard-net:
    driver: bridge
